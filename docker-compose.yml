# version field removed — obsolete in modern Docker Compose

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:6
    platform: linux/arm64/v8
    container_name: commercehub-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-alpine
    platform: linux/arm64/v8
    container_name: commercehub-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"      # AMQP only (alpine has no management UI)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── .NET API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commercehub-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - MongoDb__ConnectionString=mongodb://mongo:27017
      - MongoDb__DatabaseName=CommerceHub
      - RabbitMq__HostName=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__UserName=guest
      - RabbitMq__Password=guest
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  mongo_data:
  rabbitmq_data:
